<!DOCTYPE html>
<html>
<head>
    <title>HireHub</title>

    <style>
    body {
        font-family: 'Segoe UI';
        margin: 0;
        background: #f4f6f9;
    }

    nav {
        background: #1e2a38;
        padding: 15px;
        display: flex;
        align-items: center;
    }

    nav h2 {
        color: white;
        margin-right: 20px;
    }

    nav a {
        color: white;
        margin-right: 15px;
        text-decoration: none;
        font-weight: 500;
    }

    .container {
        padding: 30px;
    }

    .card {
        background: white;
        padding: 15px;
        margin: 10px 0;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    form {
        max-width: 400px;
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        background: #007bff;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn {
        display: inline-block;
        padding: 6px 12px;
        background: #007bff;
        color: white;
        border-radius: 5px;
        text-decoration: none;
    }

    .btn-disabled {
        background: gray;
        cursor: not-allowed;
    }

    
    h1 {
        color: #1e2a38;
    }

    h2 {
        color: #2c3e50;
    }

    ul {
        padding-left: 20px;
    }

    li {
        margin-bottom: 5px;
    }

    .card {
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.02);
    }
    
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #1e2a38;
        padding: 15px 30px;
    }



    .nav-right a {
        color: white;
        margin-left: 15px;
        text-decoration: none;
        font-weight: 500;
    }

    .nav-right form {
        display: inline;
    }

    .nav-right button {
        margin-left: 15px;
        background: #007bff;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
    }

    .nav-left {
        display: flex;
        flex-direction: column;
    }

    .nav-left h2 {
        color: white;
        margin: 0;
    }

    .tagline {
        color: #ccc;
        font-size: 12px;
        margin: 2px 0 0 0;
    }
    
    </style>
</head>
<body>

    <nav class="navbar">
    
    <div class="nav-left">
        <h2>HireHub</h2>
        <p class="tagline">Connecting talent with opportunity through smart matching.</p>
        
    </div>

    <div class="nav-right">
        <a href="/">Home</a>

        {% if user.is_authenticated %}
            <a href="/internships/">Internships</a>
            <a href="/profile/">Profile</a>
            <a href="/my-applications/">My Applications</a>

            <form action="/logout/" method="POST" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="/login/">Login</a>
            <a href="/register/">Register</a>
        {% endif %}
    </div>
    
    </nav>

    

    <hr>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    

</body>
</html>
