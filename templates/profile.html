{% extends 'base.html' %}

{% block content %}

<h2>Your Profile</h2>
<h4>Welcome, {{ request.user.first_name }} {{ request.user.last_name }}</h4>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Profile</button>
</form>

{% endblock %}
