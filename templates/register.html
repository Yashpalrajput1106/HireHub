{% extends 'base.html' %}

{% block content %}

<h2>Create Account</h2>

<div style="display:flex; justify-content:center;"></div>
<form method="POST">
    {% csrf_token %}

    {% for field in form %}
        <div class="card">
            <label>{{ field.label }}</label><br>
            {{ field }}
            {% if field.errors %}
                <p style="color:red;">{{ field.errors }}</p>
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit">Register</button>
</form>
</div>

{% endblock %}
